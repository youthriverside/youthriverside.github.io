<p>回首三载岁月，</p>
<p>记忆如东风而去，不见踪迹。</p>
<p>晨读时的匆匆而至，</p>
<p>午休时的缓缓而离，</p>
<p>终究成为了过去。</p>
<p>曾忆往昔之兴，</p>
<p>惟运动会，久而难忘。</p>
<p>犹记得汗水打湿了衣衫，</p>
<p>风声徘徊耳畔。</p>
<p>天上飘起云朵，忽的散开，</p>
<p>心中不知所言。</p>
<p>曾忆那年仲秋，</p>
<p>班级中最内向的同学，</p>
<p>在青春中蜕变。</p>
<p>由不语，至欢笑。</p>
<p>曾经无法度过的波涛，</p>
<p>现在啊，想回首，也看不到啦。</p>
<p>慢慢的，似树枝生出新芽。</p>
<p>在光阴中遇见知己，</p>
<p>将心灵放归。</p>
<p>相伴度过难关，凭深秋孤凉。</p>
<p>一起奔向，充满希望的远方。</p>
<p>艺术节时匆匆而逝的筹备，</p>
<p>留下余音绕梁的欢乐。</p>
<p>与杂乱无章的教室。</p>
<p>曾经相聚以为永远，</p>
<p>却不知日月如梭，梭梭滴泪。</p>
<p>也许分别的人那一刻即将到来，</p>
<p>我们将离别校园</p>
<p>——承载三年岁月的净土</p>
<p>难以想象啊，三年就像一场梦，</p>
<p>在阵阵凉风中，飘向另一丛树。</p>
<p>泪水或已充盈眼眶，</p>
<p>怀念落叶纷飞、</p>
<p>怀念春花飘荡，</p>
<p>亦怀念，青草悠悠。</p>
<p>敬爱的老师也将分别，</p>
<p>迎接新一批春芽，</p>
<p>而往日纯真的青葱年华啊，</p>
<p>也只存在于，</p>
<p>早已逝去的时光里。</p>
<p>负雨   于十月译</p>
<p>附原文</p>
<p>​       Looking back at these past three years<br>　　I remember many things<br>　　Trying to be on time for morning readings<br>　　Running when the lunch bell rings<br>　　I remember the excitement<br>　　Of the school sports day each year<br>　　The many long hours of training<br>　　Pride of overcoming fear<br>　　I remember starting day one<br>　　The shyest in my whole class<br>　　Never speaking to anyone<br>　　And thinking I would not pass<br>　　Then slowly I made some new friends<br>　　To remember forever<br>　　Helping each other with homework<br>　　Getting better together<br>　　Preparing for art festivals<br>　　And making a great big mess<br>　　Having fun at New Year’s parties<br>　　Wishing everyone the best<br>　　We have learned a different language<br>　　That is from a foreign land<br>　　English brings many challenges<br>　　We work hard to understand<br>　　And now it’s time to graduate<br>　　We will leave our lovely school<br>　　I can’t believe it’s been three years<br>　　I’m trying to keep my cool<br>　　But it’s difficult not to cry<br>　　I’ll miss the school trees and flowers<br>　　And our kind and caring teachers<br>　　Wonderful memories of ours  </p>
